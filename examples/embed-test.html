<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Anchor widget — one-tag embed test</title>
</head>
<body>
  <h1>Blank page</h1>
  <p>The only Anchor-related line on this page is the script tag below.
     Run the API (<code>make run</code>), open this file in a browser, and the
     support bubble appears in the bottom-right corner.</p>

  <!-- Point data-api at wherever the API is hosted. -->
  <script src="http://127.0.0.1:8000/widget.js"
          data-api="http://127.0.0.1:8000"
          data-business="Nimbus"
          data-color="#6ea8fe"
          data-machinery="off"></script>
</body>
</html>
